name: Format simple TUI branch

on:
  push:
    branches:
      - agent/simple-interactive-tui

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/simple-interactive-tui
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply rustfmt
        run: cargo fmt --all
      - name: Commit formatting
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "Takokit CI"
          git config user.email "actions@users.noreply.github.com"
          git add apps/cli/src/tui
          git commit -m "Format interactive TUI redesign"
          git push origin HEAD:agent/simple-interactive-tui
