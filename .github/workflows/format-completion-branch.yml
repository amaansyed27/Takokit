name: Format completion branch once

on:
  push:
    branches:
      - agent/workspaces-sessions-model-matrix

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspaces-sessions-model-matrix
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format Rust workspace
        run: cargo fmt --all
      - name: Remove one-time workflow
        run: rm .github/workflows/format-completion-branch.yml
      - name: Commit formatting
        shell: bash
        run: |
          git config user.name "Takokit CI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Format final completion branch"
          git push origin HEAD:agent/workspaces-sessions-model-matrix
