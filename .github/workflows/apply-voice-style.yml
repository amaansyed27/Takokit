name: Apply voice profile style import

on:
  push:
    branches:
      - agent/workspaces-sessions-model-matrix

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspaces-sessions-model-matrix
      - name: Add style import
        shell: python
        run: |
          from pathlib import Path
          path = Path("apps/gui/src/styles/globals.css")
          source = path.read_text()
          line = '@import "./voice-profiles.css";\n'
          if line not in source:
              anchor = '@import "./voice-settings.css";\n'
              source = source.replace(anchor, anchor + line)
              path.write_text(source)
      - name: Commit style import
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "Takokit CI"
          git config user.email "actions@users.noreply.github.com"
          git add apps/gui/src/styles/globals.css
          git commit -m "Load voice profile styles"
          git push origin HEAD:agent/workspaces-sessions-model-matrix
