name: Wire OpenVoice adapter

on:
  push:
    branches:
      - agent/workspaces-sessions-model-matrix

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspaces-sessions-model-matrix
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Activate OpenVoice
        shell: python
        run: |
          from pathlib import Path
          specs = Path("crates/takokit-package/src/runtime_python_specs.rs")
          source = specs.read_text()
          if "OPENVOICE_ADAPTER" not in source:
              source = source.replace(
                  'const COQUI_TTS_ADAPTER: &str = include_str!("../../../runners/python/coqui_tts_adapter.py");\n',
                  'const COQUI_TTS_ADAPTER: &str = include_str!("../../../runners/python/coqui_tts_adapter.py");\nconst OPENVOICE_ADAPTER: &str = include_str!("../../../runners/python/openvoice_adapter.py");\n',
              )
          old = '''    AdapterSpec {
        id: "openvoice",
        model_family: "openvoice",
        python: "3.11",
        packages: &[],
        script: None,
        note: "Reserved for the OpenVoice tone-color conversion integration.",
    },
'''
          new = '''    AdapterSpec {
        id: "openvoice",
        model_family: "openvoice",
        python: "3.11",
        packages: &[
            "torch",
            "torchaudio",
            "huggingface_hub",
            "git+https://github.com/myshell-ai/OpenVoice.git",
            "git+https://github.com/myshell-ai/MeloTTS.git",
        ],
        script: Some(OPENVOICE_ADAPTER),
        note: "OpenVoice V2 tone-color cloning through the official OpenVoice and MeloTTS APIs.",
    },
'''
          if old in source:
              source = source.replace(old, new)
          elif new not in source:
              raise SystemExit("OpenVoice spec anchor missing")
          specs.write_text(source)

          manifest = Path("registry/models/openvoice.toml")
          manifest.write_text('''id = "openvoice"
          name = "OpenVoice V2"
          family = "openvoice"
          version = "2.0.0"
          kind = "voice-cloning"
          backend = "python-managed"
          runner = "takokit-python-managed"
          required_adapter = "openvoice"
          license = "mit-model-license-check-required"
          description = "OpenVoice V2 tone-color cloning using a consent-backed target voice profile and the official OpenVoice/MeloTTS APIs."

          [capabilities]
          tts = true
          stt = false
          voice_cloning = true
          live_transcription = false
          live_audio = true

          [hardware]
          cpu = true
          gpu = true
          min_ram = "8gb"

          [artifacts]
          metadata_only = false
          weights = []
          voices = []
          '''.replace("          ", ""))
      - run: cargo fmt --all
      - name: Commit OpenVoice support
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "Takokit CI"
          git config user.email "actions@users.noreply.github.com"
          git add crates/takokit-package/src/runtime_python_specs.rs registry/models/openvoice.toml
          git commit -m "Add OpenVoice V2 cloning support"
          git push origin HEAD:agent/workspaces-sessions-model-matrix
