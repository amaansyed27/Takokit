name: Verify CLI repair

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-cli-repair.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - id: fmt
        name: cargo fmt
        continue-on-error: true
        run: cargo fmt --all -- --check

      - id: check
        name: cargo check
        continue-on-error: true
        run: cargo check --workspace

      - id: test
        name: cargo test
        continue-on-error: true
        run: cargo test --workspace

      - id: build
        name: cargo release build
        continue-on-error: true
        run: cargo build --release

      - id: audit
        name: file-size audit
        continue-on-error: true
        run: python scripts/audit_file_sizes.py

      - name: Publish verification status
        if: always()
        uses: actions/github-script@v7
        env:
          FMT: ${{ steps.fmt.outcome }}
          CHECK: ${{ steps.check.outcome }}
          TEST: ${{ steps.test.outcome }}
          BUILD: ${{ steps.build.outcome }}
          AUDIT: ${{ steps.audit.outcome }}
        with:
          script: |
            const outcomes = {
              fmt: process.env.FMT,
              check: process.env.CHECK,
              test: process.env.TEST,
              build: process.env.BUILD,
              audit: process.env.AUDIT,
            };
            const passed = Object.values(outcomes).every(v => v === 'success');
            const description = Object.entries(outcomes)
              .map(([k, v]) => `${k}=${v}`)
              .join(', ')
              .slice(0, 140);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'takokit/cli-repair',
              description,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
            if (!passed) core.setFailed(description);
