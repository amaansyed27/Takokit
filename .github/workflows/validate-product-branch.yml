name: Validate product completion branch

on:
  push:
    branches:
      - agent/workspaces-sessions-model-matrix

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspaces-sessions-model-matrix
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/gui/package-lock.json
      - name: Format and validate
        id: validation
        shell: bash
        run: |
          set +e
          cargo fmt --all
          cargo check --workspace > cargo-check.log 2>&1
          CHECK=$?
          cargo test --workspace > cargo-test.log 2>&1
          TEST=$?
          (cd apps/gui && npm ci > ../../gui-install.log 2>&1 && npm run build > ../../gui-build.log 2>&1)
          GUI=$?
          python scripts/audit_file_sizes.py > file-size-audit.log 2>&1
          SIZE=$?
          {
            echo "cargo_check=$CHECK"
            echo "cargo_test=$TEST"
            echo "gui_build=$GUI"
            echo "file_size_audit=$SIZE"
            echo
            echo "== cargo check =="
            tail -160 cargo-check.log
            echo
            echo "== cargo test =="
            tail -160 cargo-test.log
            echo
            echo "== GUI build =="
            tail -160 gui-build.log
            echo
            echo "== file-size audit =="
            cat file-size-audit.log
          } > branch-validation.txt
          echo "check=$CHECK" >> "$GITHUB_OUTPUT"
          echo "test=$TEST" >> "$GITHUB_OUTPUT"
          echo "gui=$GUI" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Remove temporary workflows after success
        if: steps.validation.outputs.check == '0' && steps.validation.outputs.test == '0' && steps.validation.outputs.gui == '0' && steps.validation.outputs.size == '0'
        run: |
          rm -f \
            .github/workflows/format-product-branch.yml \
            .github/workflows/fix-clone-call.yml \
            .github/workflows/apply-voice-ui.yml \
            .github/workflows/apply-voice-style.yml \
            .github/workflows/wire-tui-clone.yml \
            .github/workflows/cleanup-product-maintenance.yml \
            .github/workflows/wire-expanded-model-specs.yml \
            .github/workflows/validate-product-branch.yml \
            branch-validation.txt
      - name: Commit formatted branch and validation state
        shell: bash
        run: |
          git config user.name "Takokit CI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            if [ "${{ steps.validation.outputs.check }}" = 0 ] && \
               [ "${{ steps.validation.outputs.test }}" = 0 ] && \
               [ "${{ steps.validation.outputs.gui }}" = 0 ] && \
               [ "${{ steps.validation.outputs.size }}" = 0 ]; then
              git commit -m "Validate product completion branch"
            else
              git commit -m "Record product branch validation failures"
            fi
            git push origin HEAD:agent/workspaces-sessions-model-matrix
          fi
      - name: Fail when validation failed
        if: steps.validation.outputs.check != '0' || steps.validation.outputs.test != '0' || steps.validation.outputs.gui != '0' || steps.validation.outputs.size != '0'
        run: exit 1
