name: Apply progress refinements

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-progress-refinement.yml

permissions:
  contents: write

jobs:
  refine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply targeted refinements
        shell: python
        run: |
          from pathlib import Path

          path = Path("crates/takokit-package/src/orchestrator.rs")
          text = path.read_text()
          text = text.replace(
              "    runtime_model_source::estimate_model_source_bytes,\n",
              "    runtime_model_source::{estimate_model_source_bytes, model_source_staging_path},\n",
          )
          text = text.replace(
              '''        vec![
                      takokit_root.join("cache").join("downloads"),
                      takokit_root.join("blobs").join("sha256"),
                      takokit_root.join("models"),
                  ],''',
              '''        vec![
                      takokit_root.join("cache").join("downloads"),
                      model_source_staging_path(takokit_root, &model.id),
                  ],''',
          )
          path.write_text(text)

          path = Path("crates/takokit-package/src/progress.rs")
          text = path.read_text()
          text = text.replace(
              "    snapshot: Arc<Mutex<InstallProgress>>,\n",
              "    snapshot: Arc<Mutex<InstallProgress>>,\n    persist_lock: Arc<Mutex<()>>,\n",
          )
          text = text.replace(
              "            snapshot: Arc::new(Mutex::new(InstallProgress {\n",
              "            snapshot: Arc::new(Mutex::new(InstallProgress {\n",
          )
          text = text.replace(
              "                updated_at_ms: now,\n            })),\n        };",
              "                updated_at_ms: now,\n            })),\n            persist_lock: Arc::new(Mutex::new(())),\n        };",
          )
          text = text.replace(
              "    fn persist(&self) {\n        let snapshot = match self.snapshot.lock() {",
              "    fn persist(&self) {\n        let _persist_guard = match self.persist_lock.lock() {\n            Ok(guard) => guard,\n            Err(_) => return,\n        };\n        let snapshot = match self.snapshot.lock() {",
          )
          path.write_text(text)

          path = Path("apps/cli/src/progress.rs")
          text = path.read_text()
          old = '''fn compact_message(value: &str, maximum: usize) -> String {
              let mut output = String::new();
              for character in value.chars() {
                  if output.chars().count() >= maximum {
                      break;
                  }
                  output.push(if character.is_control() {
                      ' '
                  } else {
                      character
                  });
              }
              if value.chars().count() > maximum && maximum >= 3 {
                  output.truncate(output.len().saturating_sub(3));
                  output.push_str("...");
              }
              output
          }'''
          new = '''fn compact_message(value: &str, maximum: usize) -> String {
              let clean = value
                  .chars()
                  .map(|character| if character.is_control() { ' ' } else { character })
                  .collect::<Vec<_>>();
              if clean.len() <= maximum {
                  return clean.into_iter().collect();
              }
              if maximum < 3 {
                  return clean.into_iter().take(maximum).collect();
              }
              clean
                  .into_iter()
                  .take(maximum - 3)
                  .chain(['.', '.', '.'])
                  .collect()
          }'''
          if old not in text:
              raise SystemExit("compact_message block was not found")
          path.write_text(text.replace(old, new))
      - run: cargo fmt --all
      - name: Commit refinements
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/cli/src/progress.rs crates/takokit-package/src/orchestrator.rs crates/takokit-package/src/progress.rs crates/takokit-package/src/runtime_model_source.rs
          git commit -m "Refine resumable pull progress"
          git push origin HEAD:main
