name: Verify Whisper runtime asset

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/probe-whisper-runtime.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - id: probe
        name: Download and verify pinned Windows runtime
        shell: pwsh
        continue-on-error: true
        run: |
          $Version = 'v1.9.1'
          $Expected = '7d8be46ecd31828e1eb7a2ecdd0d6b314feafd82163038ab6092594b0a063539'
          $Url = "https://github.com/ggml-org/whisper.cpp/releases/download/$Version/whisper-bin-x64.zip"
          $Archive = Join-Path $env:RUNNER_TEMP 'whisper-bin-x64.zip'
          $Extracted = Join-Path $env:RUNNER_TEMP 'whisper-runtime'

          Invoke-WebRequest -Uri $Url -OutFile $Archive
          $File = Get-Item $Archive
          $Hash = (Get-FileHash -Algorithm SHA256 $Archive).Hash.ToLowerInvariant()
          Expand-Archive -Path $Archive -DestinationPath $Extracted
          $Cli = Get-ChildItem -Recurse $Extracted -Filter whisper-cli.exe | Select-Object -First 1

          Write-Host "URL=$Url"
          Write-Host "BYTES=$($File.Length)"
          Write-Host "EXPECTED=$Expected"
          Write-Host "SHA256=$Hash"
          Write-Host "CLI=$($Cli.FullName)"

          if ($Hash -ne $Expected) { throw "Checksum mismatch: expected $Expected, got $Hash" }
          if (-not $Cli) { throw 'Official archive does not contain whisper-cli.exe' }

      - name: Publish probe status
        if: always()
        uses: actions/github-script@v7
        env:
          OUTCOME: ${{ steps.probe.outcome }}
        with:
          script: |
            const passed = process.env.OUTCOME === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'takokit/whisper-runtime',
              description: passed ? 'official v1.9.1 Windows runtime verified' : 'official v1.9.1 Windows runtime verification failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
            if (!passed) core.setFailed('Whisper runtime verification failed');
