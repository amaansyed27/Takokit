name: Format task-first TUI

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/format-task-first-tui.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all
      - name: Commit formatting
        shell: bash
        run: |
          rm .github/workflows/format-task-first-tui.yml
          git config user.name "Takokit automation"
          git config user.email "actions@users.noreply.github.com"
          git add apps/cli/src/tui .github/workflows/format-task-first-tui.yml
          git commit -m "Format task-first TUI"
          git pull --rebase origin main
          git push origin HEAD:main
