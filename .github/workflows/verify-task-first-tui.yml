name: Verify task-first TUI

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-task-first-tui.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/gui/package-lock.json
      - id: fmt
        continue-on-error: true
        run: cargo fmt --all -- --check
      - id: audit
        continue-on-error: true
        run: python scripts/audit_file_sizes.py
      - id: check
        continue-on-error: true
        run: cargo check --workspace
      - id: test
        continue-on-error: true
        run: cargo test --workspace
      - id: release
        continue-on-error: true
        run: cargo build --release
      - id: gui
        continue-on-error: true
        working-directory: apps/gui
        run: |
          npm ci
          npm run build
      - name: Publish status
        if: always()
        uses: actions/github-script@v7
        env:
          FMT: ${{ steps.fmt.outcome }}
          AUDIT: ${{ steps.audit.outcome }}
          CHECK: ${{ steps.check.outcome }}
          TEST: ${{ steps.test.outcome }}
          RELEASE: ${{ steps.release.outcome }}
          GUI: ${{ steps.gui.outcome }}
        with:
          script: |
            const outcomes = {
              fmt: process.env.FMT,
              audit: process.env.AUDIT,
              check: process.env.CHECK,
              test: process.env.TEST,
              release: process.env.RELEASE,
              gui: process.env.GUI,
            };
            const passed = Object.values(outcomes).every(value => value === 'success');
            const description = Object.entries(outcomes).map(([key, value]) => `${key}=${value}`).join(', ').slice(0, 140);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'takokit/task-first-tui',
              description,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
            if (!passed) core.setFailed(description);
