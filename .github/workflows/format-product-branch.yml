name: Format product branch

on:
  push:
    branches:
      - agent/workspaces-sessions-model-matrix

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspaces-sessions-model-matrix
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all
      - shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "Takokit CI"
          git config user.email "actions@users.noreply.github.com"
          git add apps crates Cargo.toml Cargo.lock
          git commit -m "Format expanded runtime and session work"
          git push origin HEAD:agent/workspaces-sessions-model-matrix
