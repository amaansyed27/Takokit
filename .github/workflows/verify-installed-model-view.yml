name: Apply installed model view formatting

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.event.head_commit.message != 'Format installed model view'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all
      - name: Commit formatting
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No formatting changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/cli/src/output/human.rs apps/cli/src/tui/catalog.rs crates/takokit-package/src/inventory.rs crates/takokit-package/src/records.rs
          git commit -m "Format installed model view"
          git push origin HEAD:main
