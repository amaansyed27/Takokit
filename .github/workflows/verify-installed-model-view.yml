name: Verify installed model view

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - id: fmt
        continue-on-error: true
        run: cargo fmt --all -- --check
      - id: test
        continue-on-error: true
        run: cargo test --workspace
      - id: build
        continue-on-error: true
        run: cargo build --release
      - name: Publish status
        if: always()
        uses: actions/github-script@v7
        env:
          FMT: ${{ steps.fmt.outcome }}
          TEST: ${{ steps.test.outcome }}
          BUILD: ${{ steps.build.outcome }}
        with:
          script: |
            const outcomes = {fmt: process.env.FMT, test: process.env.TEST, build: process.env.BUILD};
            const passed = Object.values(outcomes).every(value => value === 'success');
            const description = Object.entries(outcomes).map(([key, value]) => `${key}=${value}`).join(', ');
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'takokit/installed-model-view',
              description,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
            if (!passed) core.setFailed(description);
