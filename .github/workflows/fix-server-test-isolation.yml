name: Fix server test isolation

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-server-test-isolation.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Make transcription test storage unique
        shell: python
        run: |
          from pathlib import Path
          path = Path('crates/takokit-server/src/router/tests/models.rs')
          text = path.read_text(encoding='utf-8')
          old = '    let root = std::env::temp_dir().join("takokit-server-transcription-resolution-test");'
          new = '''    let root = std::env::temp_dir().join(format!(
              "takokit-server-transcription-resolution-test-{}",
              uuid::Uuid::new_v4()
          ));'''
          if old not in text:
              raise SystemExit('target transcription test root was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
      - name: Format and test
        run: |
          cargo fmt --all
          cargo test -p takokit-server --lib
      - name: Remove one-time workflow
        run: rm .github/workflows/fix-server-test-isolation.yml
      - name: Commit and push fix
        run: |
          git config user.name "Takokit automation"
          git config user.email "actions@users.noreply.github.com"
          git add crates/takokit-server/src/router/tests/models.rs .github/workflows/fix-server-test-isolation.yml
          git commit -m "Isolate unsupported capability route test"
          git pull --rebase origin main
          git push origin HEAD:main