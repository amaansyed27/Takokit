name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  statuses: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Repository quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Audit source file sizes
        shell: bash
        run: |
          set -o pipefail
          python scripts/audit_file_sizes.py 2>&1 | tee file-size-audit.txt

      - name: Upload file-size audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: file-size-audit
          path: file-size-audit.txt
          if-no-files-found: error

  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        id: formatting
        run: cargo fmt --all -- --check

      - name: Capture rustfmt patch
        if: failure() && steps.formatting.outcome == 'failure'
        shell: bash
        run: |
          cargo fmt --all
          git diff --binary > rustfmt-${{ runner.os }}.patch

      - name: Upload rustfmt patch
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-${{ matrix.os }}
          path: rustfmt-${{ runner.os }}.patch
          if-no-files-found: ignore

      - name: Check workspace (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -o pipefail
          cargo check --workspace 2>&1 | tee cargo-check.log

      - name: Check workspace (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo check --workspace 2>&1 | Tee-Object -FilePath cargo-check-windows.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload cargo check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-check-${{ matrix.os }}
          path: |
            cargo-check.log
            cargo-check-windows.log
          if-no-files-found: ignore

      - name: Test workspace (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace 2>&1 | tee cargo-test.log

      - name: Test workspace (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo test --workspace 2>&1 | Tee-Object -FilePath cargo-test-windows.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Rust test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-test-${{ matrix.os }}
          path: |
            cargo-test.log
            cargo-test-windows.log
          if-no-files-found: ignore

  gui:
    name: GUI build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/gui/package-lock.json

      - name: Install GUI dependencies
        run: npm ci
        working-directory: apps/gui

      - name: Build GUI
        shell: bash
        working-directory: apps/gui
        run: |
          set -o pipefail
          npm run build 2>&1 | tee gui-build.log

      - name: Upload GUI build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-build-log
          path: apps/gui/gui-build.log
          if-no-files-found: ignore

  publish-status:
    name: Publish aggregate status
    if: always() && github.event_name == 'push'
    needs:
      - quality
      - rust
      - gui
    runs-on: ubuntu-latest
    steps:
      - name: Publish classic commit status
        uses: actions/github-script@v7
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          RUST_RESULT: ${{ needs.rust.result }}
          GUI_RESULT: ${{ needs.gui.result }}
        with:
          script: |
            const results = {
              quality: process.env.QUALITY_RESULT,
              rust: process.env.RUST_RESULT,
              gui: process.env.GUI_RESULT,
            };
            const passed = Object.values(results).every((result) => result === 'success');
            const description = Object.entries(results)
              .map(([name, result]) => `${name}=${result}`)
              .join(', ')
              .slice(0, 140);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'takokit/ci',
              description,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
