name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-review:
    name: Format review source
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format workspace
        run: cargo fmt --all

      - name: Upload formatted resolution test
        uses: actions/upload-artifact@v4
        with:
          name: formatted-resolution-test
          path: crates/takokit-package/src/tests/resolution.rs

      - name: Check workspace
        run: cargo check --workspace

      - name: Test workspace
        run: cargo test --workspace
