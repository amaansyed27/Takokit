name: Fix clone call site

on:
  push:
    branches:
      - agent/workspaces-sessions-model-matrix

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspaces-sessions-model-matrix
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Update clone call
        shell: python
        run: |
          from pathlib import Path
          path = Path("apps/cli/src/lib.rs")
          source = path.read_text()
          old = '''        Some(Command::Clone(args)) => {
              run_clone(args, workspace.as_ref().expect("clone workspace"))?
          }
'''
          new = '''        Some(Command::Clone(args)) => run_clone(
              args,
              &store,
              &package_registry,
              workspace.as_ref().expect("clone workspace"),
          )?,
'''
          if old not in source:
              old = '''        Some(Command::Clone(args)) => {
              run_clone(args, workspace.as_ref().expect("clone workspace"))?
          },
'''
          if old not in source:
              raise SystemExit("old clone call not found")
          path.write_text(source.replace(old, new))
      - run: cargo fmt --all
      - name: Commit fix
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "Takokit CI"
          git config user.email "actions@users.noreply.github.com"
          git add apps/cli/src/lib.rs apps/cli/src/direct_inference.rs crates apps Cargo.lock
          git commit -m "Complete CLI voice profile cloning"
          git push origin HEAD:agent/workspaces-sessions-model-matrix
