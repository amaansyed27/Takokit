name: Release CLI polish

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/release-cli-polish.yml

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply human-first CLI rendering
        shell: python
        run: |
          from pathlib import Path

          def read(path): return Path(path).read_text(encoding='utf-8')
          def write(path, text): Path(path).write_text(text, encoding='utf-8')

          # Add a non-conflicting global machine-output mode.
          p = 'apps/cli/src/args.rs'
          text = read(p)
          needle = '    #[arg(long, global = true)]\n    pub(crate) direct: bool,\n'
          insert = needle + '    /// Output format for all commands.\n    #[arg(long, global = true, value_parser = ["human", "json"], default_value = "human")]\n    pub(crate) output: String,\n'
          if 'pub(crate) output: String' not in text:
              if needle not in text: raise SystemExit('Cli direct field not found')
              text = text.replace(needle, insert, 1)
          write(p, text)

          # Add centralized rendering to output.rs.
          p = 'apps/cli/src/output.rs'
          text = read(p)
          if 'pub(crate) fn set_json_output' not in text:
              text += r'''

use std::sync::atomic::{AtomicBool, Ordering};

static JSON_OUTPUT: AtomicBool = AtomicBool::new(false);

pub(crate) fn set_json_output(enabled: bool) {
    JSON_OUTPUT.store(enabled, Ordering::Relaxed);
}

pub(crate) fn json_output() -> bool {
    JSON_OUTPUT.load(Ordering::Relaxed)
}

pub(crate) fn print_serializable<T: serde::Serialize>(value: &T) -> anyhow::Result<()> {
    print_value(&serde_json::to_value(value)?)
}

pub(crate) fn print_value(value: &serde_json::Value) -> anyhow::Result<()> {
    if json_output() {
        println!("{}", serde_json::to_string_pretty(value)?);
    } else {
        render_value(value, 0);
    }
    Ok(())
}

fn render_value(value: &serde_json::Value, depth: usize) {
    if let Some(data) = value.get("data") {
        render_value(data, depth);
        return;
    }
    match value {
        serde_json::Value::Array(items) => {
            if items.is_empty() {
                println!("No entries.");
            } else {
                for item in items { render_row(item); }
            }
        }
        serde_json::Value::Object(map) => {
            if map.contains_key("model_id") && map.contains_key("artifacts") {
                render_pull(map);
                return;
            }
            if map.contains_key("output_path") {
                render_output(map);
                return;
            }
            if map.contains_key("instance_id") && map.contains_key("pid") {
                println!("Daemon running");
                field("pid", map.get("pid"));
                println!("  {:<12} {}:{}", "address", text(map, "host"), scalar(map.get("port")));
                field("executable", map.get("executable"));
                field("storage", map.get("storage_root"));
                return;
            }
            if let Some(removed) = map.get("removed").and_then(|v| v.as_bool()) {
                println!("{} {}", if removed { "Removed" } else { "Not installed:" }, text(map, "id"));
                return;
            }
            if let Some(summary) = map.get("summary") {
                render_row(summary);
                return;
            }
            for (key, item) in map {
                if item.is_null() { continue; }
                match item {
                    serde_json::Value::Object(_) | serde_json::Value::Array(_) => {
                        println!("{}{}:", "  ".repeat(depth), label(key));
                        render_value(item, depth + 1);
                    }
                    _ => println!("{}{:<14} {}", "  ".repeat(depth), label(key), scalar(Some(item))),
                }
            }
        }
        _ => println!("{}", scalar(Some(value))),
    }
}

fn render_pull(map: &serde_json::Map<String, serde_json::Value>) {
    println!("Model {}", text(map, "model_id"));
    stage(map, "artifacts", "artifacts");
    stage(map, "runner_contract", "runner");
    stage(map, "runner_runtime", "runtime");
    stage(map, "adapter", "adapter");
    println!("  {:<12} {}", "ready", if map.get("executable").and_then(|v| v.as_bool()).unwrap_or(false) { "yes" } else { "no" });
    if let Some(path) = map.get("logs_path").and_then(|v| v.as_str()) {
        println!("  {:<12} {path}", "logs");
    }
}

fn render_output(map: &serde_json::Map<String, serde_json::Value>) {
    let output = text(map, "output_path");
    if map.get("text").and_then(|v| v.as_str()).is_some() {
        println!("Transcription complete");
        if !text(map, "model").is_empty() { println!("  {:<12} {}", "model", text(map, "model")); }
        if let Some(body) = map.get("text").and_then(|v| v.as_str()) { println!("\n{body}"); }
        if !output.is_empty() { println!("\nSaved to {output}"); }
    } else {
        println!("Audio ready");
        if !text(map, "model").is_empty() { println!("  {:<12} {}", "model", text(map, "model")); }
        if !text(map, "engine").is_empty() { println!("  {:<12} {}", "engine", text(map, "engine")); }
        if let Some(bytes) = map.get("bytes").and_then(|v| v.as_u64()) { println!("  {:<12} {}", "size", bytes_label(bytes)); }
        if !output.is_empty() { println!("  {:<12} {output}", "output"); }
    }
}

fn render_row(value: &serde_json::Value) {
    let Some(map) = value.as_object() else { println!("{}", scalar(Some(value))); return; };
    let primary = ["name", "title", "id", "model_id"].iter()
        .find_map(|key| map.get(*key).and_then(|v| v.as_str())).unwrap_or("entry");
    print!("{primary}");
    if let Some(id) = map.get("id").and_then(|v| v.as_str()).filter(|id| *id != primary) { print!("  {id}"); }
    if let Some(state) = ["status", "state", "lifecycle_state", "runtime_state"].iter()
        .find_map(|key| map.get(*key).and_then(|v| v.as_str())) { print!("  [{state}]"); }
    if let Some(model) = map.get("last_model").and_then(|v| v.as_str()) { print!("  model={model}"); }
    if let Some(count) = map.get("event_count").and_then(|v| v.as_u64()) { print!("  events={count}"); }
    println!();
}

fn stage(map: &serde_json::Map<String, serde_json::Value>, key: &str, name: &str) {
    let Some(item) = map.get(key) else { return; };
    if item.is_null() { return; }
    let state = item.get("state").and_then(|v| v.as_str()).unwrap_or("ready");
    println!("  {name:<12} {state}");
    if let Some(detail) = item.get("detail").and_then(|v| v.as_str()).filter(|v| *v != state) {
        println!("               {detail}");
    }
}

fn field(name: &str, value: Option<&serde_json::Value>) {
    println!("  {name:<12} {}", scalar(value));
}
fn text(map: &serde_json::Map<String, serde_json::Value>, key: &str) -> String {
    map.get(key).and_then(|v| v.as_str()).unwrap_or("").to_string()
}
fn scalar(value: Option<&serde_json::Value>) -> String {
    match value {
        Some(serde_json::Value::String(v)) => v.clone(),
        Some(serde_json::Value::Bool(v)) => v.to_string(),
        Some(serde_json::Value::Number(v)) => v.to_string(),
        Some(serde_json::Value::Null) | None => "-".to_string(),
        Some(v) => v.to_string(),
    }
}
fn label(value: &str) -> String { value.replace('_', " ") }
fn bytes_label(bytes: u64) -> String {
    if bytes >= 1_073_741_824 { format!("{:.1} GB", bytes as f64 / 1_073_741_824.0) }
    else if bytes >= 1_048_576 { format!("{:.1} MB", bytes as f64 / 1_048_576.0) }
    else if bytes >= 1024 { format!("{:.1} KB", bytes as f64 / 1024.0) }
    else { format!("{bytes} B") }
}
'''
          text = text.replace('println!("{}", serde_json::to_string_pretty(&models)?);', 'print_serializable(&models)?;')
          text = text.replace('println!("{}", serde_json::to_string_pretty(&runners)?);', 'print_serializable(&runners)?;')
          write(p, text)

          # Main command dispatcher.
          p = 'apps/cli/src/lib.rs'
          text = read(p)
          text = text.replace('        direct,\n        workspace:', '        direct,\n        output,\n        workspace:')
          text = text.replace('    let store = LocalStore::new(cli_storage_root());', '    set_json_output(output == "json" || explicit_json_requested(&command));\n    let store = LocalStore::new(cli_storage_root());')
          text = text.replace('println!("{}", serde_json::to_string_pretty(&state.status())?);', 'print_serializable(&state.status())?;')
          text = text.replace('println!("{}", serde_json::to_string_pretty(&report)?);', 'print_serializable(&report)?;')
          text = text.replace('println!("{}", serde_json::to_string_pretty(registry.voices())?)', 'print_serializable(registry.voices())?')
          text = text.replace('println!("{}", serde_json::to_string_pretty(&value)?);', 'print_value(&value)?;')
          text = text.replace('println!("{}", serde_json::to_string_pretty(&records)?);', 'print_serializable(&records)?;')
          text = text.replace('println!("{}", serde_json::to_string_pretty(&record)?);', 'print_serializable(&record)?;')
          text = text.replace('Some(info) => println!("{}", serde_json::to_string_pretty(&info)?),', 'Some(info) => print_serializable(&info)?,')
          text = text.replace('''println!(
                "{}",
                serde_json::to_string_pretty(&daemon::start(&store, &config)?)?
            )''', 'print_serializable(&daemon::start(&store, &config)?)?')
          text = text.replace('''println!(
                    "{}",
                    serde_json::to_string_pretty(&daemon::start(&store, &config)?)?
                );''', 'print_serializable(&daemon::start(&store, &config)?)?;')
          text = text.replace('''println!(
                "{}",
                serde_json::to_string_pretty(&serde_json::json!({
                    "id": model,
                    "removed": removed
                }))?
            );''', 'print_value(&serde_json::json!({"id": model, "removed": removed}))?;')
          text = text.replace('''println!(
                    "{}",
                    serde_json::to_string_pretty(&serde_json::json!({
                        "id": runner,
                        "removed": removed
                    }))?
                );''', 'print_value(&serde_json::json!({"id": runner, "removed": removed}))?;')
          if 'fn explicit_json_requested' not in text:
              text += '''\nfn explicit_json_requested(command: &Option<Command>) -> bool {\n    matches!(\n        command,\n        Some(Command::Doctor(DoctorArgs { json: true }))\n            | Some(Command::Plan(PlanArgs { json: true, .. }))\n            | Some(Command::Test(TestArgs { json: true, .. }))\n            | Some(Command::Runner { command: RunnerCommand::Doctor { json: true, .. } })\n            | Some(Command::Adapter { command: AdapterCommand::Doctor { json: true, .. } })\n    )\n}\n'''
          write(p, text)

          # Daemon API routing.
          p = 'apps/cli/src/daemon_commands.rs'
          text = read(p).replace('    println!("{}", serde_json::to_string_pretty(&output)?);', '    print_value(&output)?;')
          write(p, text)

          # Direct inference output.
          p = 'apps/cli/src/direct_inference.rs'
          text = read(p).replace('println!("{}", serde_json::to_string_pretty(&response)?);', 'print_serializable(&response)?;')
          text = text.replace('println!("{}", serde_json::to_string_pretty(&profile)?);', 'print_serializable(&profile)?;')
          write(p, text)

          # Session output.
          p = 'apps/cli/src/session_commands.rs'
          text = read(p).replace('println!("{}", serde_json::to_string_pretty(&sessions)?);', 'crate::print_serializable(&sessions)?;')
          text = text.replace('println!("{}", serde_json::to_string_pretty(&session)?);', 'crate::print_serializable(&session)?;')
          text = text.replace('''println!(
                "{}",
                serde_json::to_string_pretty(&serde_json::json!({
                    "id": id,
                    "removed": store.remove_session(id)?
                }))?
            );''', '''crate::print_value(&serde_json::json!({
                "id": id,
                "removed": store.remove_session(id)?
            }))?;''')
          write(p, text)

      - name: Format and verify full workspace
        run: |
          cargo fmt --all
          cargo check --workspace
          cargo test --workspace
          python scripts/audit_file_sizes.py
      - name: Remove one-time workflow
        run: rm .github/workflows/release-cli-polish.yml
      - name: Commit and push
        run: |
          git config user.name 'Takokit automation'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Polish CLI output across Takokit'
          git pull --rebase origin main
          git push origin HEAD:main
