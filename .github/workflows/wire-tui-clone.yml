name: Wire TUI cloning view

on:
  push:
    branches:
      - agent/workspaces-sessions-model-matrix

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspaces-sessions-model-matrix
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Wire clone state and actions
        shell: python
        run: |
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              source = file.read_text()
              if new in source:
                  return
              if old not in source:
                  raise SystemExit(f"missing patch anchor in {path}: {old[:80]!r}")
              file.write_text(source.replace(old, new))

          replace(
              "apps/cli/src/tui/catalog.rs",
              "    pub stt: bool,\n    pub executable: bool,",
              "    pub stt: bool,\n    pub voice_cloning: bool,\n    pub executable: bool,",
          )
          replace(
              "apps/cli/src/tui/catalog.rs",
              "                stt: model.capabilities.stt,\n                executable: plan.executable,",
              "                stt: model.capabilities.stt,\n                voice_cloning: model.capabilities.voice_cloning,\n                executable: plan.executable,",
          )

          app = Path("apps/cli/src/tui/app.rs")
          source = app.read_text()
          if "CloneVoice {" not in source:
              source = source.replace(
                  "    Transcribe {\n        model: String,\n        audio: String,\n    },",
                  "    Transcribe {\n        model: String,\n        audio: String,\n    },\n    CloneVoice {\n        model: String,\n        name: String,\n        sample: String,\n    },",
              )
          if "    Clone," not in source:
              source = source.replace(
                  "    Transcribe,\n    Sessions,",
                  "    Transcribe,\n    Clone,\n    Sessions,",
              )
              source = source.replace(
                  "    pub const ALL: [Self; 6] = [\n        Self::Models,\n        Self::Speak,\n        Self::Transcribe,\n        Self::Sessions,",
                  "    pub const ALL: [Self; 7] = [\n        Self::Models,\n        Self::Speak,\n        Self::Transcribe,\n        Self::Clone,\n        Self::Sessions,",
              )
              source = source.replace(
                  "            Self::Transcribe => \"Transcribe\",\n            Self::Sessions => \"Sessions\",",
                  "            Self::Transcribe => \"Transcribe\",\n            Self::Clone => \"Clone\",\n            Self::Sessions => \"Sessions\",",
              )
          if "pub clone_state:" not in source:
              source = source.replace(
                  "    pub transcribe_audio_cursor: usize,\n    pub storage_root: String,",
                  "    pub transcribe_audio_cursor: usize,\n    pub clone_state: super::clone::CloneState,\n    pub storage_root: String,",
              )
              source = source.replace(
                  "        let (tts_models, stt_models) = capability_indexes(&models);\n        let sessions =",
                  "        let (tts_models, stt_models) = capability_indexes(&models);\n        let clone_state = super::clone::CloneState::new(&models);\n        let sessions =",
              )
              source = source.replace(
                  "            transcribe_audio_cursor: 0,\n            storage_root:",
                  "            transcribe_audio_cursor: 0,\n            clone_state,\n            storage_root:",
              )
              source = source.replace(
                  "        self.transcribe_model_index = find_capability_index(\n            &self.models,\n            &self.stt_models,\n            transcribe_model.as_deref(),\n            \"whisper-tiny\",\n        );\n        self.storage_root =",
                  "        self.transcribe_model_index = find_capability_index(\n            &self.models,\n            &self.stt_models,\n            transcribe_model.as_deref(),\n            \"whisper-tiny\",\n        );\n        self.clone_state.reload_models(&self.models);\n        self.storage_root =",
              )
              source = source.replace(
                  "    pub fn selected_transcribe_model(&self) -> Option<&ModelRow> {",
                  "    pub fn selected_clone_model(&self) -> Option<&ModelRow> {\n        self.clone_state\n            .model_indexes\n            .get(self.clone_state.model_index)\n            .and_then(|index| self.models.get(*index))\n    }\n\n    pub fn selected_transcribe_model(&self) -> Option<&ModelRow> {",
              )
          app.write_text(source)

          input_path = Path("apps/cli/src/tui/input.rs")
          source = input_path.read_text()
          if "TuiTab::Clone =>" not in source:
              source = source.replace(
                  "            TuiTab::Transcribe => self.handle_transcribe_key(key),\n            TuiTab::Sessions =>",
                  "            TuiTab::Transcribe => self.handle_transcribe_key(key),\n            TuiTab::Clone => super::clone::handle_key(self, key),\n            TuiTab::Sessions =>",
              )
              source = source.replace(
                  "            \"transcribe\" | \"stt\" => self.tab = TuiTab::Transcribe,\n            \"runners\" =>",
                  "            \"transcribe\" | \"stt\" => self.tab = TuiTab::Transcribe,\n            \"clone\" | \"voices\" => self.tab = TuiTab::Clone,\n            \"runners\" =>",
              )
              source = source.replace(
                  "Use /sessions, /new, /models, /speak, /transcribe, /runners, /system, or /help.",
                  "Use /sessions, /new, /models, /speak, /transcribe, /clone, /runners, /system, or /help.",
              )
              source = source.replace(
                  "            TuiTab::Sessions => self",
                  "            TuiTab::Clone => super::clone::handle_key(\n                self,\n                KeyEvent::new(KeyCode::Enter, KeyModifiers::NONE),\n            ),\n            TuiTab::Sessions => self",
              )
          input_path.write_text(source)

          ui_path = Path("apps/cli/src/tui/ui.rs")
          source = ui_path.read_text()
          if "TuiTab::Clone =>" not in source:
              source = source.replace(
                  "        TuiTab::Transcribe => render_transcribe(frame, page[1], app),\n        TuiTab::Sessions =>",
                  "        TuiTab::Transcribe => render_transcribe(frame, page[1], app),\n        TuiTab::Clone => super::clone::render(frame, page[1], app),\n        TuiTab::Sessions =>",
              )
              source = source.replace(
                  "        TuiTab::Sessions => \"↑/↓ select",
                  "        TuiTab::Clone => \"Tab fields · Space consent · Enter continue/create · /sessions\",\n        TuiTab::Sessions => \"↑/↓ select",
              )
              source = source.replace(
                  "sessions, new, models, speak, transcribe, runners, system, help",
                  "sessions, new, models, speak, transcribe, clone, runners, system, help",
              )
              source = source.replace(
                  "Speak and Transcribe\\n  Tab through fields",
                  "Speak, Transcribe, and Clone\\n  Tab through fields",
              )
          ui_path.write_text(source)

          mod_path = Path("apps/cli/src/tui/mod.rs")
          source = mod_path.read_text()
          if "mod clone;" not in source:
              source = source.replace("mod catalog;\n", "mod catalog;\nmod clone;\n")
          if "TuiAction::CloneVoice" not in source:
              source = source.replace(
                  "        TuiAction::Transcribe { model, audio } => (\n            format!(\"Transcribing with {model}\"),\n            vec![\"transcribe\".into(), audio, \"--model\".into(), model],\n        ),",
                  "        TuiAction::Transcribe { model, audio } => (\n            format!(\"Transcribing with {model}\"),\n            vec![\"transcribe\".into(), audio, \"--model\".into(), model],\n        ),\n        TuiAction::CloneVoice { model, name, sample } => (\n            format!(\"Creating voice profile {name}\"),\n            vec![\n                \"clone\".into(),\n                sample,\n                \"--name\".into(),\n                name,\n                \"--model\".into(),\n                model,\n                \"--consent\".into(),\n            ],\n        ),",
              )
          mod_path.write_text(source)
      - run: cargo fmt --all
      - name: Commit TUI clone wiring
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "Takokit CI"
          git config user.email "actions@users.noreply.github.com"
          git add apps/cli/src/tui
          git commit -m "Add interactive TUI voice cloning"
          git push origin HEAD:agent/workspaces-sessions-model-matrix
