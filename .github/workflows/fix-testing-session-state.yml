name: Fix testing guide session state

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-testing-session-state.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update testing guide
        shell: python
        run: |
          from pathlib import Path

          path = Path('docs/TESTING.md')
          text = path.read_text(encoding='utf-8')

          old = '''Create an evidence directory:

```powershell
$Evidence = "$HOME\\takokit-test-evidence"
New-Item -ItemType Directory -Force $Evidence | Out-Null
'''
          new = '''Create an evidence directory. PowerShell variables are session-scoped, so rerun this bootstrap after opening a new terminal before continuing any later section:

```powershell
$Evidence = Join-Path $HOME "takokit-test-evidence"
New-Item -ItemType Directory -Force $Evidence | Out-Null
$Evidence = (Resolve-Path $Evidence).Path
'''
          if old not in text:
              raise SystemExit('section 1 evidence block not found')
          text = text.replace(old, new, 1)

          old = '''```powershell
& $Tako daemon start | Out-Null
$Before = & $Tako daemon status | ConvertFrom-Json
'''
          new = '''```powershell
$Before = & $Tako daemon start | ConvertFrom-Json
'''
          if old not in text:
              raise SystemExit('section 6 crash recovery block not found')
          text = text.replace(old, new, 1)

          old = '''## 7. Two isolated project workspaces

```powershell
$ProjectA = "$env:TEMP\\takokit-project-a"
'''
          new = '''## 7. Two isolated project workspaces

If this section is running in a new PowerShell terminal, restore the shared test variables first. This prevents an unset `$Evidence` from expanding paths such as `$Evidence\\session-a-list.json` to the drive root (`C:\\session-a-list.json`):

```powershell
$Evidence = Join-Path $HOME "takokit-test-evidence"
New-Item -ItemType Directory -Force $Evidence | Out-Null
$Evidence = (Resolve-Path $Evidence).Path

$env:TAKOKIT_HOME = Join-Path $env:TEMP "takokit-release-test"
$Tako = (Resolve-Path .\\target\\release\\tako.exe).Path

if ([string]::IsNullOrWhiteSpace($Evidence) -or -not (Test-Path $Evidence -PathType Container)) {
  throw "Evidence directory is not initialized"
}

$ProjectA = "$env:TEMP\\takokit-project-a"
'''
          if old not in text:
              raise SystemExit('section 7 heading block not found')
          text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
      - name: Remove one-time workflow
        run: rm .github/workflows/fix-testing-session-state.yml
      - name: Commit and push
        run: |
          git config user.name "Takokit automation"
          git config user.email "actions@users.noreply.github.com"
          git add docs/TESTING.md .github/workflows/fix-testing-session-state.yml
          git commit -m "Make testing sections safe across PowerShell sessions"
          git pull --rebase origin main
          git push origin HEAD:main
