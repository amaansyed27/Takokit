name: Format once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/format-once.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust formatter
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format and remove this workflow
        shell: bash
        run: |
          cargo fmt --all
          rm .github/workflows/format-once.yml

      - name: Commit formatter output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply rustfmt across the expanded model runtime"
          git push origin HEAD:main
