name: Package GPT-SoVITS smoke dataset

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/package-gpt-sovits-smoke-dataset.yml

permissions:
  contents: read
  statuses: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch LibriSpeech dummy audio
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/wangyu09/exkaldi.git "$RUNNER_TEMP/exkaldi"

      - name: Build Takokit GPT-SoVITS dataset
        shell: bash
        run: |
          set -euo pipefail
          src="$RUNNER_TEMP/exkaldi/tutorials/librispeech_dummy"
          root="$RUNNER_TEMP/takokit-gpt-sovits-smoke"
          dataset="$root/gpt-sovits-dataset"
          mkdir -p "$dataset/wavs"

          cp "$src"/wav/1272-*.wav "$dataset/wavs/"

          awk '
            $1 ~ /^1272-/ {
              id=$1
              $1=""
              sub(/^ /, "")
              print "wavs/" id ".wav|librispeech-1272|en|" $0
            }
          ' "$src/test/text" > "$dataset/train.list"

          cat > "$root/README.txt" <<'EOF'
          Takokit GPT-SoVITS smoke dataset
          =================================

          Contents:
          - gpt-sovits-dataset/train.list
          - gpt-sovits-dataset/wavs/*.wav

          This package contains 15 clean, transcribed English WAV clips from
          LibriSpeech speaker 1272. It is prepared for Takokit's one-epoch
          GPT-SoVITS orchestration smoke test, not for voice-quality training.

          Use:
            -TrainingSamples "<extracted path>\gpt-sovits-dataset"

          Source audio:
          - LibriSpeech ASR corpus, SLR12
          - https://www.openslr.org/12
          - License: Creative Commons Attribution 4.0 (CC BY 4.0)

          Source mirror used for packaging:
          - https://github.com/wangyu09/exkaldi
          - tutorials/librispeech_dummy/wav

          Keep this README with redistributed copies for attribution.
          EOF

          cat > "$root/REFERENCE.txt" <<'EOF'
          Speaker: librispeech-1272
          Language: English
          Clips: 15
          Audio format: PCM WAV, mono, 16 kHz
          Purpose: GPT-SoVITS pipeline smoke testing only
          EOF

          (cd "$root" && sha256sum gpt-sovits-dataset/wavs/*.wav gpt-sovits-dataset/train.list > SHA256SUMS.txt)
          test "$(find "$dataset/wavs" -maxdepth 1 -name '*.wav' | wc -l)" -eq 15
          test "$(wc -l < "$dataset/train.list")" -eq 15

          (cd "$RUNNER_TEMP" && zip -r -9 Takokit_GPT_SoVITS_Smoke_Dataset.zip takokit-gpt-sovits-smoke)

      - name: Upload dataset ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Takokit_GPT_SoVITS_Smoke_Dataset
          path: ${{ runner.temp }}/Takokit_GPT_SoVITS_Smoke_Dataset.zip
          if-no-files-found: error
          retention-days: 7

      - name: Publish package status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              context: 'takokit/gpt-sovits-dataset',
              description: '${{ job.status }}' === 'success' ? 'dataset ZIP ready' : 'dataset packaging failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
