id = "takokit-python-managed"
name = "Takokit Managed Python Runner"
version = "0.1.0"
kind = "python-managed"
platforms = ["windows-x64", "linux-x64", "macos-arm64"]
supported_model_families = ["Qwen3-TTS", "CosyVoice", "CosyVoice2", "F5-TTS", "Fish Speech", "Dia", "Chatterbox", "GPT-SoVITS", "OpenVoice", "RVC"]
supported_tasks = ["text_to_speech", "voice_cloning", "live_audio"]
dependency_strategy = "managed"
install_state = "runtime-missing"
notes = "Takokit will manage isolated Python, packages, wheels, caches, and logs internally under ~/.takokit/runners/python-managed. Users do not manually install Python, Torch, CUDA packages, FFmpeg, clone repositories, or patch requirements files."
description = "Shared managed Python/PyTorch runner contract for heavy research voice models."
