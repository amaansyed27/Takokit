id = "rvc"
name = "RVC"
family = "rvc"
version = "0.1.0"
kind = "voice-convert"
backend = "python-managed"
runner = "takokit-python-managed"
required_adapter = "rvc"
license = "mit"
description = "Retrieval-based Voice Conversion with pinned HuBERT and RMVPE base assets. Conversion requires a user-supplied or trained target .pth checkpoint and optional .index file."

[capabilities]
tts = false
stt = false
voice_cloning = false
voice_training = false
voice_conversion = true
live_transcription = false
live_audio = false

[hardware]
cpu = true
gpu = true
min_ram = "8gb"
min_vram = "4gb"

[source]
provider = "hugging-face"
repository = "lj1995/VoiceConversionWebUI"
revision = "d53cd75f4e954ffc87f251200a682c9e63b6b821"
allow_patterns = ["hubert_base.pt", "rmvpe.pt"]

[artifacts]
metadata_only = false
weights = []
configs = []
voices = []
