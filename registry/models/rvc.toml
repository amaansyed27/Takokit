id = "rvc"
name = "RVC"
version = "0.1.0"
kind = "voice-convert"
backend = "python-managed"
runner = "takokit-python-managed"
license = "license-check-required"
description = "Retrieval-based voice conversion family. Metadata-only; GPL/runtime dependency risks must be documented before executable support."

[capabilities]
tts = false
stt = false
voice_cloning = true
live_transcription = false
live_audio = true

[hardware]
cpu = true
gpu = true
min_ram = "8gb"

[artifacts]
metadata_only = true
weights = []
voices = []
