id = "qwen3-tts-0.6b-base"
name = "Qwen3-TTS 0.6B Base"
family = "qwen"
version = "0.2.0"
kind = "voice-cloning"
backend = "python-managed"
runner = "takokit-python-managed"
required_adapter = "qwen3_tts"
license = "apache-2.0"
description = "Official Qwen3-TTS 12Hz 0.6B Base checkpoint for zero-shot local voice cloning."

[capabilities]
tts = true
stt = false
voice_cloning = true
voice_training = false
voice_conversion = false
live_transcription = false
live_audio = false

[hardware]
cpu = true
gpu = true
min_ram = "16gb"
min_vram = "6gb"

[source]
provider = "hugging-face"
repository = "Qwen/Qwen3-TTS-12Hz-0.6B-Base"
revision = "main"
ignore_patterns = ["*.gguf", "*.onnx"]

[artifacts]
metadata_only = false
weights = []
configs = []
voices = []
