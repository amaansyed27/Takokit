id = "qwen3-tts-1.7b-base"
name = "Qwen3-TTS 1.7B Base"
family = "qwen"
version = "0.2.0"
kind = "voice-cloning"
backend = "python-managed"
runner = "takokit-python-managed"
required_adapter = "qwen3_tts"
license = "apache-2.0"
description = "Official Qwen3-TTS 12Hz 1.7B Base checkpoint for higher-quality zero-shot voice cloning."

[capabilities]
tts = true
stt = false
voice_cloning = true
voice_training = false
voice_conversion = false
live_transcription = false
live_audio = false

[hardware]
cpu = true
gpu = true
min_ram = "24gb"
min_vram = "8gb"

[source]
provider = "hugging-face"
repository = "Qwen/Qwen3-TTS-12Hz-1.7B-Base"
revision = "main"
ignore_patterns = ["*.gguf", "*.onnx"]

[artifacts]
metadata_only = false
weights = []
configs = []
voices = []
