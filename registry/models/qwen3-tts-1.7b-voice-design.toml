id = "qwen3-tts-1.7b-voice-design"
name = "Qwen3-TTS 1.7B VoiceDesign"
family = "qwen"
version = "0.2.0"
kind = "tts"
backend = "python-managed"
runner = "takokit-python-managed"
required_adapter = "qwen3_tts"
