id = "chatterbox"
name = "Chatterbox"
family = "chatterbox"
version = "0.1.0"
kind = "voice-cloning"
backend = "python-managed"
runner = "takokit-python-managed"
required_adapter = "chatterbox"
license = "non-commercial-check-required"
description = "Chatterbox local TTS with optional reference-audio voice cloning through an isolated official Python adapter. Model weights are downloaded into Takokit's global cache on first use."

[capabilities]
tts = true
stt = false
voice_cloning = true
live_transcription = false
live_audio = true

[hardware]
cpu = true
gpu = true
min_ram = "8gb"

[artifacts]
metadata_only = false
weights = []
voices = []
