id = "chatterbox"
name = "Chatterbox"
version = "0.1.0"
kind = "voice-cloning"
backend = "python-managed"
runner = "takokit-python-managed"
license = "non-commercial-check-required"
description = "Voice cloning and TTS package placeholder. Metadata-only; users must not run upstream Gradio or Python setup manually through Takokit."

[capabilities]
tts = true
stt = false
voice_cloning = true
live_transcription = false
