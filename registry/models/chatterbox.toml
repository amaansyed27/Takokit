id = "chatterbox"
name = "Chatterbox"
family = "chatterbox"
version = "0.1.0"
kind = "voice-cloning"
backend = "python-managed"
runner = "takokit-python-managed"
required_adapter = "chatterbox"
license = "mit"
description = "Resemble AI Chatterbox local TTS and zero-shot voice cloning from a pulled, pinned model snapshot."

[capabilities]
tts = true
stt = false
voice_cloning = true
voice_training = false
voice_conversion = false
live_transcription = false
live_audio = false

[hardware]
cpu = true
gpu = true
min_ram = "12gb"
min_vram = "4gb"

[source]
provider = "hugging-face"
repository = "ResembleAI/chatterbox"
revision = "a19a7c880ce4f7d461e049cd561db0a0a5ec4593"
ignore_patterns = ["README.md", "*.png", "*.jpg", "Cangjie5_TC.json"]

[artifacts]
metadata_only = false
weights = []
configs = []
voices = []
