id = "f5-tts"
name = "F5-TTS"
family = "f5-tts"
version = "0.1.0"
kind = "voice-cloning"
backend = "python-managed"
runner = "takokit-python-managed"
required_adapter = "f5_tts"
license = "license-check-required"
description = "F5-TTS local speech generation with optional reference-audio voice transfer through the official API in an isolated managed environment."

[capabilities]
tts = true
stt = false
voice_cloning = true
live_transcription = false
live_audio = true

[hardware]
cpu = true
gpu = true
min_ram = "12gb"

[artifacts]
metadata_only = false
weights = []
voices = []
